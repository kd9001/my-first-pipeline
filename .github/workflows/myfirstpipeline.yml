
name: My App Pipeline

on:
  push:
    branches:
      - main
      - branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies  
        run:  pip install pytest
        
      - name: Run tests
        run: pytest test_app.py
