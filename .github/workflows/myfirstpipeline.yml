
name: My App Pipeline

on:
  push:
    branches:
      - main
      - branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies  
        run:  pip install pytest
        
      - name: Run tests
        run: pytest test_app.py
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build confirmation
        run: echo "Tests passed! App is ready to build"
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy confirmation
        run: echo "Deploying to production"      